<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASF Player - Interactive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <!-- ইউটিউব এপিআই -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        
        /* ভিডিও বক্স */
        .video-box { width: 100%; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #333; position: relative; padding-bottom: 56.25%; height: 0; margin-top: 10px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* লাইক, কমেন্ট, শেয়ার সেকশন */
        .action-bar { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .action-item:active { transform: scale(0.9); }
        .action-icon { font-size: 20px; margin-bottom: 5px; }
        .action-count { font-size: 12px; color: #888; }
        .active-like { color: #ff4757; }

        /* প্লেলিস্ট - স্ক্রল ফিক্স */
        .playlist-title { font-size: 16px; margin: 15px 5px 10px; color: #3498db; display: flex; justify-content: space-between; align-items: center; }
        .playlist { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            padding-bottom: 10px; 
            scrollbar-width: thin; /* ফায়ারফক্সের জন্য */
            scrollbar-color: #3498db #1a1a1a; /* ফায়ারফক্সের জন্য */
            cursor: grab; /* ড্র্যাগ করার জন্য */
            user-select: none; /* ড্র্যাগ করার সময় টেক্সট সিলেক্ট বন্ধ */
            -webkit-overflow-scrolling: touch; /* মোবাইলে স্মুথ স্ক্রল */
        }
        
        /* ওয়েবকিট ব্রাউজারের জন্য (ক্রোম, এজ, সাফারি) */
        .playlist::-webkit-scrollbar {
            height: 5px; /* স্ক্রলবারের উচ্চতা */
        }
        
        .playlist::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }
        
        .playlist::-webkit-scrollbar-thumb {
            background: #3498db;
            border-radius: 10px;
        }
        
        .playlist::-webkit-scrollbar-thumb:hover {
            background: #2980b9;
        }
        
        .playlist:active {
            cursor: grabbing; /* ড্র্যাগ করার সময় */
        }
        
        .video-card { 
            min-width: 140px; 
            background: #1a1a1a; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1.5px solid #222; 
            cursor: pointer; 
            transition: 0.3s;
            flex-shrink: 0; /* কার্ডগুলো সঙ্কুচিত না হওয়ার জন্য */
        }
        
        .video-card:hover { 
            transform: scale(0.98); 
            border-color: #3498db;
        }
        
        .video-card img { 
            width: 100%; 
            height: 80px; 
            object-fit: cover; 
            pointer-events: none; /* ড্র্যাগ করার সময় ইমেজ ড্র্যাগ হওয়া বন্ধ */
        }
        
        .video-card p { 
            padding: 8px; 
            font-size: 11px; 
            text-align: center; 
            color: #bbb; 
            pointer-events: none; /* ড্র্যাগ করার সময় টেক্সট ড্র্যাগ হওয়া বন্ধ */
        }
        
        .video-card.active { 
            border-color: #3498db; 
            background: #111; 
            box-shadow: 0 0 10px rgba(52,152,219,0.3); 
        }
        
        .video-card.active p { 
            color: #3498db; 
            font-weight: bold; 
        }

        /* স্লাইডার */
        .image-slider { width: 100%; height: 180px; position: relative; overflow: hidden; border-radius: 15px; margin-bottom: 10px; background: #111; }
        .image-slide { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; }
        .image-active { display: block; }

        /* নেক্সট ইন্ডিকেটর */
        .next-indicator { 
            background: #3498db; 
            color: white; 
            padding: 5px 10px; 
            border-radius: 20px; 
            font-size: 11px; 
            display: inline-block; 
            margin-left: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .next-indicator:hover {
            opacity: 0.8;
        }
        
        /* স্ক্রল বাটন - ডেস্কটপের জন্য */
        .scroll-buttons {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }
        
        .scroll-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }
        
        .scroll-btn:hover {
            background: #3498db;
            border-color: #3498db;
        }
        
        @media (max-width: 768px) {
            .scroll-buttons {
                display: none; /* মোবাইলে বাটন লুকাবে */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-slider" id="imageSlider"></div>

        <div class="video-box">
            <iframe id="mainVideo" src="" allowfullscreen></iframe>
        </div>

        <h3 id="videoTitle" style="padding: 10px 5px; font-size: 16px;">লোড হচ্ছে...</h3>

        <div class="action-bar">
            <div class="action-item" onclick="doLike()">
                <span class="action-icon" id="likeIcon">❤️</span>
                <span class="action-count" id="likeCount">0</span>
            </div>
            <div class="action-item" onclick="toggleComment()">
                <span class="action-icon">💬</span>
                <span class="action-count" id="commentCount">0</span>
            </div>
            <div class="action-item" onclick="shareVideo()">
                <span class="action-icon">📤</span> 
                <span class="action-count">শেয়ার</span>
            </div>
        </div>

        <div id="commentBox" style="display:none; background:#111; padding:15px; border-radius:15px; margin-top:10px; border:1px solid #333;">
            <h4 style="color:#3498db; margin-bottom:10px; font-size:14px;">মন্তব্য লিখুন</h4>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="commentInput" placeholder="এখানে লিখুন..." style="flex:1; padding:10px; border-radius:8px; border:1px solid #444; background:#000; color:white; outline:none;">
                <button onclick="sendComment()" style="padding:10px 15px; background:#3498db; border:none; border-radius:8px; color:white; font-weight:bold;">পাঠান</button>
            </div>
            <div id="commentList" style="max-height:200px; overflow-y:auto; font-size:13px; color:#bbb;"></div>
        </div>

        <div class="playlist-title">
            <span>পরবর্তী ভিডিওগুলো</span>
            <div style="display: flex; align-items: center;">
                <span class="next-indicator" id="nextIndicator" onclick="toggleAutoNext()">স্বয়ংক্রিয় পরবর্তী চালু</span>
                <div class="scroll-buttons">
                    <div class="scroll-btn" onclick="scrollPlaylist('left')">←</div>
                    <div class="scroll-btn" onclick="scrollPlaylist('right')">→</div>
                </div>
            </div>
        </div>
        <div class="playlist" id="playlist" onwheel="handlePlaylistWheel(event)"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqUasbhUNKBBmWLkPaSnvI3pA9IMLOUHo",
            databaseURL: "https://video-pleyar-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "video-pleyar"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // গ্লোবাল ভেরিয়েবল
        let videosList = [];
        let currentVideoIndex = 0;
        let player; // ইউটিউব প্লেয়ার অবজেক্ট
        let autoNextEnabled = true; // অটো নেক্সট চালু/বন্ধ
        let isDragging = false;
        let startX;
        let scrollLeft;

        window.onload = () => {
            loadContent();
            loadStats();
            initDragScroll(); // ড্র্যাগ স্ক্রল ইনিশিয়ালাইজ
        };

        // ড্র্যাগ করে স্ক্রল করার ফাংশন
        function initDragScroll() {
            const playlist = document.getElementById('playlist');
            
            playlist.addEventListener('mousedown', (e) => {
                isDragging = true;
                playlist.classList.add('active');
                startX = e.pageX - playlist.offsetLeft;
                scrollLeft = playlist.scrollLeft;
                playlist.style.cursor = 'grabbing';
            });
            
            playlist.addEventListener('mouseleave', () => {
                isDragging = false;
                playlist.classList.remove('active');
                playlist.style.cursor = 'grab';
            });
            
            playlist.addEventListener('mouseup', () => {
                isDragging = false;
                playlist.classList.remove('active');
                playlist.style.cursor = 'grab';
            });
            
            playlist.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - playlist.offsetLeft;
                const walk = (x - startX) * 2; // স্ক্রল স্পিড
                playlist.scrollLeft = scrollLeft - walk;
            });
        }

        // মাউস হুইল দিয়ে স্ক্রল (ডেস্কটপের জন্য)
        function handlePlaylistWheel(event) {
            const playlist = document.getElementById('playlist');
            // হুইল ডেল্টা ব্যবহার করে স্ক্রল
            playlist.scrollLeft += event.deltaY * 2; // হুইল স্পিড
            
            // পৃষ্ঠা স্ক্রল না হওয়ার জন্য
            event.preventDefault();
        }

        // স্ক্রল বাটন
        function scrollPlaylist(direction) {
            const playlist = document.getElementById('playlist');
            const scrollAmount = 300; // কতটুকু স্ক্রল হবে
            
            if (direction === 'left') {
                playlist.scrollLeft -= scrollAmount;
            } else {
                playlist.scrollLeft += scrollAmount;
            }
        }

        function loadStats() {
            db.ref('stats').on('value', snap => {
                const data = snap.val() || {};
                document.getElementById('likeCount').innerText = data.likes || 0;
                document.getElementById('commentCount').innerText = data.comments || 0;
            });
        }

        function doLike() {
            const likeIcon = document.getElementById('likeIcon');
            let hasLiked = localStorage.getItem('asf_has_liked') === 'true';

            if (!hasLiked) {
                db.ref('stats/likes').transaction(c => (c || 0) + 1);
                localStorage.setItem('asf_has_liked', 'true');
                likeIcon.innerText = "❤️"; 
                likeIcon.style.transform = "scale(1.4)";
                setTimeout(() => likeIcon.style.transform = "scale(1)", 200);
            } else {
                db.ref('stats/likes').transaction(c => (c > 0 ? c - 1 : 0));
                localStorage.setItem('asf_has_liked', 'false');
                likeIcon.innerText = "🤍"; 
                likeIcon.style.transform = "scale(0.8)";
                setTimeout(() => likeIcon.style.transform = "scale(1)", 200);
            }
        }

        function toggleComment() {
            const box = document.getElementById('commentBox');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
            if(box.style.display === 'block') loadComments();
        }

        function sendComment() {
            const input = document.getElementById('commentInput');
            const msg = input.value.trim();
            
            if(msg !== "") {
                const newComment = {
                    text: msg,
                    time: new Date().toLocaleString('bn-BD')
                };
                
                db.ref('all_comments').push(newComment);
                db.ref('stats/comments').transaction(c => (c || 0) + 1);
                
                input.value = "";
            } else {
                alert("কিছু তো লিখুন বস!");
            }
        }

        function loadComments() {
            db.ref('all_comments').limitToLast(10).on('value', snap => {
                const list = document.getElementById('commentList');
                list.innerHTML = '';
                const data = snap.val() || {};
                
                Object.values(data).reverse().forEach(c => {
                    list.innerHTML += `
                        <div style="background:#1a1a1a; padding:8px; border-radius:8px; margin-bottom:8px; border-left:3px solid #3498db;">
                            <p style="color:white; margin-bottom:3px;">${c.text}</p>
                            <small style="color:#666; font-size:10px;">${c.time}</small>
                        </div>
                    `;
                });
            });
        }

        function shareVideo() {
            const videoTitle = document.getElementById('videoTitle').innerText;
            const shareUrl = window.location.href;

            if (navigator.share) {
                navigator.share({
                    title: 'ASF Player',
                    text: 'এই ভিডিওটি দেখুন: ' + videoTitle,
                    url: shareUrl
                })
                .then(() => {
                    if (navigator.vibrate) navigator.vibrate(50);
                })
                .catch((err) => {
                    console.log("শেয়ার বাতিল বা এরর:", err);
                    copyToClipboard(shareUrl);
                });
            } else {
                copyToClipboard(shareUrl);
            }
        }

        function copyToClipboard(text) {
            const input = document.createElement('input');
            input.value = text;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            
            const btn = document.querySelector('.action-item:last-child span.action-count');
            const originalText = btn.innerText;
            btn.innerText = "লিঙ্ক কপি হয়েছে!";
            btn.style.color = "#2ecc71";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "#888";
            }, 2000);
        }

        function getEmbedUrl(url) {
            if (!url) return '';
            
            if (url.includes('drive.google.com')) {
                let fileId = null;
                
                if (url.includes('/d/')) {
                    fileId = url.split('/d/')[1]?.split('/')[0];
                } else if (url.includes('id=')) {
                    fileId = url.split('id=')[1]?.split('&')[0];
                }
                
                if (fileId) {
                    return `https://drive.google.com/file/d/${fileId}/preview`;
                }
            }
            
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let vidId = url.match(/(?:v=|\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
                if (vidId) {
                    return `https://www.youtube.com/embed/${vidId[1]}?enablejsapi=1&autoplay=1&rel=0`;
                }
            }
            
            return url;
        }

        function getThumbnailUrl(url) {
            let thumbUrl = "https://via.placeholder.com/140x80/111/333?text=Video";
            
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const vidId = url.match(/(?:v=|\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
                if (vidId) {
                    thumbUrl = `https://img.youtube.com/vi/${vidId[1]}/mqdefault.jpg`;
                }
            } 
            else if (url.includes('drive.google.com')) {
                const fileId = url.match(/\/d\/([^\/]+)/) || url.match(/id=([^\&]+)/);
                if (fileId && fileId[1]) {
                    thumbUrl = `https://drive.google.com/thumbnail?id=${fileId[1]}&sz=w400`;
                }
            }
            
            return thumbUrl;
        }

        function loadContent() {
            // ভিডিও লোড
            db.ref('videos').on('value', snap => {
                const videos = snap.val() || {};
                videosList = Object.values(videos);
                const list = document.getElementById('playlist');
                list.innerHTML = '';

                Object.keys(videos).forEach((key, i) => {
                    const url = videos[key];
                    const thumbUrl = getThumbnailUrl(url);

                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => playVideo(url, i + 1);
                    card.innerHTML = `
                        <div style="position:relative;">
                            <img src="${thumbUrl}" onerror="this.src='https://via.placeholder.com/140x80/000/3498db?text=Video+${i+1}'" draggable="false">
                            <div style="position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.7); color:white; font-size:10px; padding:2px 5px; border-radius:3px;">▶</div>
                        </div>
                        <p>ভিডিও ${i + 1}</p>
                    `;
                    list.appendChild(card);
                });

                // প্রথম ভিডিও অটো-প্লে
                if (videosList.length > 0 && !document.getElementById('mainVideo').src) {
                    playVideo(videosList[0], 1);
                }
            });

            // স্লাইডার ইমেজ লোড
            db.ref('images').on('value', s => {
                const imgs = s.val() || {};
                const slider = document.getElementById('imageSlider');
                slider.innerHTML = '';
                
                Object.values(imgs).forEach((url, i) => {
                    let finalImageUrl = url;

                    if (url.includes('drive.google.com')) {
                        const fileId = url.match(/\/d\/([^\/]+)/) || url.match(/id=([^\&]+)/);
                        if (fileId && fileId[1]) {
                            finalImageUrl = `https://drive.google.com/thumbnail?id=${fileId[1]}&sz=w800`;
                        }
                    }

                    const imgTag = document.createElement('img');
                    imgTag.src = finalImageUrl;
                    imgTag.className = `image-slide ${i === 0 ? 'image-active' : ''}`;
                    
                    imgTag.onerror = function() {
                        this.src = 'https://via.placeholder.com/800x400/111/3498db?text=Image+Error';
                    };

                    slider.appendChild(imgTag);
                });
            });
        }

        // ইউটিউব প্লেয়ার রেডি হলে কল হবে
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('mainVideo', {
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // প্লেয়ার স্টেট চেঞ্জ হলে
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                console.log('ভিডিও শেষ, পরবর্তী চালানো হচ্ছে...');
                if (autoNextEnabled) {
                    playNextVideo();
                }
            }
        }

        // পরবর্তী ভিডিও চালান
        function playNextVideo() {
            if (videosList.length > 0) {
                let nextIndex = currentVideoIndex + 1;
                
                if (nextIndex > videosList.length) {
                    nextIndex = 1;
                }
                
                playVideo(videosList[nextIndex - 1], nextIndex);
                showNotification('পরবর্তী ভিডিও চালানো হচ্ছে');
            }
        }

        // নোটিফিকেশন দেখান
        function showNotification(message) {
            const indicator = document.getElementById('nextIndicator');
            const originalText = indicator.innerText;
            indicator.innerText = message;
            indicator.style.background = '#27ae60';
            
            setTimeout(() => {
                indicator.innerText = originalText;
                indicator.style.background = '#3498db';
            }, 2000);
        }

        function playVideo(url, index) {
            currentVideoIndex = index;
            const embedUrl = getEmbedUrl(url);
            
            if (embedUrl) {
                const iframe = document.getElementById('mainVideo');
                iframe.src = embedUrl;
                document.getElementById('videoTitle').innerText = `🎬 ভিডিও ${index} প্লে হচ্ছে`;
                
                // অ্যাক্টিভ ক্লাস আপডেট
                document.querySelectorAll('.video-card').forEach((card, i) => {
                    if (i + 1 === index) {
                        card.classList.add('active');
                        
                        // স্ক্রলে আনুন
                        card.scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'nearest', 
                            inline: 'center' 
                        });
                    } else {
                        card.classList.remove('active');
                    }
                });
                
                // ইউটিউব প্লেয়ার আপডেট
                if (player && player.loadVideoById) {
                    const vidId = url.match(/(?:v=|\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
                    if (vidId) {
                        player.loadVideoById(vidId[1]);
                    }
                }
            } else {
                alert('ভিডিও লোড করা সম্ভব হয়নি!');
            }
        }

        // অটো নেক্সট টগল
        function toggleAutoNext() {
            autoNextEnabled = !autoNextEnabled;
            const indicator = document.getElementById('nextIndicator');
            if (autoNextEnabled) {
                indicator.innerText = 'স্বয়ংক্রিয় পরবর্তী চালু';
                indicator.style.background = '#3498db';
            } else {
                indicator.innerText = 'স্বয়ংক্রিয় পরবর্তী বন্ধ';
                indicator.style.background = '#e74c3c';
            }
        }

        // অটো স্লাইডার
        setInterval(() => {
            const active = document.querySelector('.image-slide.image-active');
            if (!active) return;
            
            const next = active.nextElementSibling || document.querySelector('.image-slide');
            if (next) {
                active.classList.remove('image-active');
                next.classList.add('image-active');
            }
        }, 4000);
    </script>
</body>
</html>
