<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASF Player - Pro Interactive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .image-slider { width: 100%; height: 180px; position: relative; overflow: hidden; border-radius: 15px; margin-bottom: 10px; background: #111; }
        .image-slide { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; transition: 0.5s; }
        .image-active { display: block; }
        .video-box { width: 100%; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #333; position: relative; padding-bottom: 56.25%; height: 0; margin-top: 10px; }
        .video-box #mainVideo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .action-bar { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; touch-action: manipulation; }
        .action-icon { font-size: 20px; margin-bottom: 5px; }
        .action-count { font-size: 12px; color: #888; }
        .playlist-title { font-size: 16px; margin: 15px 5px 10px; color: #3498db; }
        .playlist { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .video-card { min-width: 140px; background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1.5px solid #222; cursor: pointer; touch-action: manipulation; transition: 0.2s; }
        .video-card:active { transform: scale(0.95); border-color: #3498db; }
        .video-card img { width: 100%; height: 80px; object-fit: cover; pointer-events: none; }
        .video-card p { padding: 8px; font-size: 11px; text-align: center; color: #bbb; pointer-events: none; }
        #commentBox { display:none; background:#111; padding:15px; border-radius:15px; margin-top:10px; border:1px solid #333; }
        .comment-input-area { display: flex; gap: 10px; margin-bottom: 15px; }
        #commentInput { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; outline: none; }
        .send-btn { padding: 10px 15px; background: #3498db; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="image-slider" id="imageSlider"></div>
    <div class="video-box" id="playerParent">
        <div id="mainVideo"></div>
    </div>
    <h3 id="videoTitle" style="padding: 10px 5px; font-size: 16px;">লোড হচ্ছে...</h3>
    
    <div class="action-bar">
        <div class="action-item" onclick="doLike()"><span class="action-icon" id="likeIcon">❤️</span><span class="action-count" id="likeCount">0</span></div>
        <div class="action-item" onclick="openComment()"><span class="action-icon">💬</span><span class="action-count" id="commentCount">0</span></div>
        <div class="action-item" onclick="shareVideo()"><span class="action-icon">📤</span><span class="action-count">শেয়ার</span></div>
    </div>

    <div id="commentBox">
        <h4 style="color:#3498db; margin-bottom:10px; font-size:14px;">মন্তব্য লিখুন</h4>
        <div class="comment-input-area">
            <input type="text" id="commentInput" placeholder="এখানে লিখুন...">
            <button class="send-btn" onclick="sendComment()">পাঠান</button>
        </div>
        <div id="commentList" style="max-height:200px; overflow-y:auto; font-size:13px; color:#bbb;"></div>
    </div>

    <div class="playlist-title">পরবর্তী ভিডিওগুলো</div>
    <div class="playlist" id="playlist"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBqUasbhUNKBBmWLkPaSnvI3pA9IMLOUHo",
        databaseURL: "https://video-pleyar-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "video-pleyar"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allVideosData = [];
    let currentVideoIndex = 0;
    let player;

    window.onload = () => { loadContent(); loadStats(); };

    function extractVideoID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function playVideo(url, index) {
        currentVideoIndex = index - 1; 
        const vidId = extractVideoID(url);
        if (vidId) {
            if (player && typeof player.loadVideoById === 'function') {
                player.loadVideoById(vidId);
            } else {
                player = new YT.Player('mainVideo', {
                    height: '100%', width: '100%', videoId: vidId,
                    playerVars: { 'autoplay': 1, 'rel': 0, 'enablejsapi': 1 },
                    events: { 'onStateChange': onPlayerStateChange }
                });
            }
            document.getElementById('videoTitle').innerText = `🎬 ভিডিও ${index} প্লে হচ্ছে`;
        }
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.ENDED) playNextVideo();
    }

    function playNextVideo() {
        let nextIndex = currentVideoIndex + 1;
        if (nextIndex < allVideosData.length) playVideo(allVideosData[nextIndex], nextIndex + 1);
    }

    function loadContent() {
        db.ref('videos').on('value', snap => {
            const videos = snap.val() || {};
            const list = document.getElementById('playlist');
            list.innerHTML = '';
            allVideosData = Object.values(videos); 
            Object.keys(videos).forEach((key, i) => {
                const url = videos[key];
                const vidId = extractVideoID(url);
                let thumbUrl = vidId ? `https://img.youtube.com/vi/${vidId}/mqdefault.jpg` : "https://via.placeholder.com/140x80";
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(url, i + 1);
                card.innerHTML = `<div style="position:relative;"><img src="${thumbUrl}"><div style="position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.7); color:white; font-size:10px; padding:2px 5px; border-radius:3px;">▶</div></div><p>ভিডিও ${i + 1}</p>`;
                list.appendChild(card);
            });
            if (allVideosData.length > 0 && !player) setTimeout(() => playVideo(allVideosData[0], 1), 1000);
        });

        db.ref('images').on('value', s => {
            const imgs = s.val() || {};
            const slider = document.getElementById('imageSlider');
            slider.innerHTML = '';
            Object.values(imgs).forEach((url, i) => {
                const imgTag = document.createElement('img');
                imgTag.src = url;
                imgTag.className = `image-slide ${i === 0 ? 'image-active' : ''}`;
                slider.appendChild(imgTag);
            });
        });
    }

    setInterval(() => {
        let active = document.querySelector('.image-slide.image-active');
        if(!active) return;
        let next = active.nextElementSibling || document.querySelector('.image-slide');
        active.classList.remove('image-active'); next.classList.add('image-active');
    }, 4000);

    function loadStats() {
        db.ref('stats').on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('likeCount').innerText = data.likes || 0;
            document.getElementById('commentCount').innerText = data.comments || 0;
        });
    }

    function doLike() {
    // চেক করা হচ্ছে এই ইউজার আগে লাইক দিয়েছে কি না
    const hasLiked = localStorage.getItem('asf_liked');

    if (hasLiked) {
        alert("বস, আপনি তো অলরেডি একবার লাইক দিয়েছেন! ❤️");
        return; // ফাংশন এখানেই থেমে যাবে, ডাটাবেসে আর যোগ হবে না
    }

    // যদি আগে লাইক না দিয়ে থাকে, তবে ডাটাবেসে ১ যোগ হবে
    db.ref('stats/likes').transaction((currentLikes) => {
        return (currentLikes || 0) + 1;
    });

    // ব্রাউজারে সেভ করে রাখা যে সে লাইক দিয়েছে
    localStorage.setItem('asf_liked', 'true');

    // অ্যানিমেশন ইফেক্ট
    const icon = document.getElementById('likeIcon');
    icon.style.transform = "scale(1.4)";
    icon.innerText = "💖"; // লাইক দিলে হার্ট আইকন চেঞ্জ হবে
    setTimeout(() => {
        icon.style.transform = "scale(1)";
    }, 200);
}

    function openComment() {
        const box = document.getElementById('commentBox');
        box.style.display = (box.style.display === "none" || box.style.display === "") ? "block" : "none";
        if(box.style.display === "block") loadComments();
    }

    function sendComment() {
        const input = document.getElementById('commentInput');
        const text = input.value.trim();
        if (text !== "") {
            db.ref('comments').push({ text: text, timestamp: Date.now() });
            db.ref('stats/comments').transaction(c => (c || 0) + 1);
            input.value = "";
        }
    }

    function loadComments() {
        db.ref('comments').orderByChild('timestamp').limitToLast(20).on('value', snap => {
            const list = document.getElementById('commentList');
            list.innerHTML = '';
            snap.forEach(child => {
                const div = document.createElement('div');
                div.style.background = "#1a1a1a"; div.style.padding = "8px"; div.style.marginBottom = "5px"; div.style.borderRadius = "5px";
                div.innerHTML = `<small style="color:#3498db;">👤 ইউজার:</small> ${child.val().text}`;
                list.prepend(div);
            });
        });
    }
    function shareVideo() {
    const shareUrl = window.location.href; // আপনার সাইটের বর্তমান লিঙ্ক
    const shareTitle = "ASF Player - চমৎকার ভিডিও দেখুন!";

    // ১. যদি মোবাইল ব্রাউজার হয় (WhatsApp, FB শেয়ার অপশন আসবে)
    if (navigator.share) {
        navigator.share({
            title: shareTitle,
            text: 'বস, এই ভিডিও প্লেয়ারটি দেখুন, দারুণ সব ফিচার আছে!',
            url: shareUrl,
        })
        .then(() => console.log('সফলভাবে শেয়ার হয়েছে'))
        .catch((error) => {
            console.log('শেয়ার করা যায়নি', error);
            copyToClipboard(shareUrl); // শেয়ার ফেইল করলে লিঙ্ক কপি হবে
        });
    } else {
        // ২. যদি কম্পিউটার বা পুরোনো ব্রাউজার হয় (লিঙ্ক কপি হবে)
        copyToClipboard(shareUrl);
    }
}

// লিঙ্ক কপি করার আলাদা শক্তিশালী ফাংশন
function copyToClipboard(text) {
    const input = document.createElement('textarea');
    input.value = text;
    document.body.appendChild(input);
    input.select();
    input.setSelectionRange(0, 99999); // মোবাইলের জন্য

    try {
        document.execCommand('copy');
        alert("লিঙ্কটি কপি করা হয়েছে! এখন পেস্ট করে বন্ধুদের পাঠান।");
    } catch (err) {
        alert("দুঃখিত, কপি করা যায়নি। লিঙ্কটি ম্যানুয়ালি কপি করুন: " + text);
    }
    document.body.removeChild(input);
}
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
