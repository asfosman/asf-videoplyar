<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASF Player - Pro Interactive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .image-slider { width: 100%; height: 180px; position: relative; overflow: hidden; border-radius: 15px; margin-bottom: 10px; background: #111; }
        .image-slide { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; transition: 0.5s; }
        .image-active { display: block; }
        .video-box { width: 100%; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #333; position: relative; padding-bottom: 56.25%; height: 0; margin-top: 10px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .action-bar { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; touch-action: manipulation; }
        .action-icon { font-size: 20px; margin-bottom: 5px; }
        .action-count { font-size: 12px; color: #888; }
        .playlist-title { font-size: 16px; margin: 15px 5px 10px; color: #3498db; }
        .playlist { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .video-card { min-width: 140px; background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1.5px solid #222; cursor: pointer; touch-action: manipulation; transition: 0.2s; }
        .video-card:active { transform: scale(0.95); border-color: #3498db; }
        .video-card img { width: 100%; height: 80px; object-fit: cover; pointer-events: none; }
        .video-card p { padding: 8px; font-size: 11px; text-align: center; color: #bbb; pointer-events: none; }
        #commentBox { display:none; background:#111; padding:15px; border-radius:15px; margin-top:10px; border:1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="image-slider" id="imageSlider"></div>
    <div class="video-box">
        <iframe id="mainVideo" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    <h3 id="videoTitle" style="padding: 10px 5px; font-size: 16px;">লোড হচ্ছে...</h3>
    <div class="action-bar">
        <div class="action-item" onclick="doLike()"><span class="action-icon" id="likeIcon">❤️</span><span class="action-count" id="likeCount">0</span></div>
        <div class="action-item" onclick="openComment()"><span class="action-icon">💬</span><span class="action-count" id="commentCount">0</span></div>
        <div class="action-item" onclick="shareVideo()"><span class="action-icon">📤</span><span class="action-count">শেয়ার</span></div>
    </div>
    <div id="commentBox">
        <h4 style="color:#3498db; margin-bottom:10px; font-size:14px;">মন্তব্য লিখুন</h4>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="commentInput" placeholder="এখানে লিখুন..." style="flex:1; padding:10px; border-radius:8px; border:1px solid #444; background:#000; color:white; outline:none;">
            <button onclick="sendComment()" style="padding:10px 15px; background:#3498db; border:none; border-radius:8px; color:white; font-weight:bold;">পাঠান</button>
        </div>
        <div id="commentList" style="max-height:200px; overflow-y:auto; font-size:13px; color:#bbb;"></div>
    </div>
    <div class="playlist-title">পরবর্তী ভিডিওগুলো</div>
    <div class="playlist" id="playlist"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBqUasbhUNKBBmWLkPaSnvI3pA9IMLOUHo",
        databaseURL: "https://video-pleyar-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "video-pleyar"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.onload = () => { loadContent(); loadStats(); };

    function playVideo(url, index) {
        let embedUrl = "";
        const origin = window.location.origin;

        if (url.includes('youtube.com') || url.includes('youtu.be')) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/;
            const match = url.match(regExp);
            const vidId = (match && match[2].length === 11) ? match[2] : null;
            if (vidId) {
                // Added origin and enablejsapi for better compatibility
                embedUrl = `https://www.youtube.com/embed/${vidId}?autoplay=1&rel=0&enablejsapi=1&origin=${origin}`;
            }
        } else if (url.includes('drive.google.com')) {
            const fileId = url.match(/\/d\/([^\/]+)/)?.[1] || url.match(/id=([^\&]+)/)?.[1];
            if (fileId) embedUrl = `https://drive.google.com/file/d/${fileId}/preview`;
        } else {
            embedUrl = url;
        }

        const mainVideo = document.getElementById('mainVideo');
        if (embedUrl) {
            mainVideo.src = embedUrl;
            document.getElementById('videoTitle').innerText = `🎬 ভিডিও ${index} প্লে হচ্ছে`;
            window.scrollTo({ top: mainVideo.offsetTop - 20, behavior: 'smooth' });
        }
    }

    function loadContent() {
        db.ref('videos').on('value', snap => {
            const videos = snap.val() || {};
            const list = document.getElementById('playlist');
            list.innerHTML = '';
            Object.keys(videos).forEach((key, i) => {
                const url = videos[key];
                let thumbUrl = "https://via.placeholder.com/140x80/111/333?text=Loading...";
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    const vidId = url.match(/(?:v=|\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
                    if (vidId) thumbUrl = `https://img.youtube.com/vi/${vidId[1]}/mqdefault.jpg`;
                } else if (url.includes('drive.google.com')) {
                    const fileId = url.match(/\/d\/([^\/]+)/)?.[1] || url.match(/id=([^\&]+)/)?.[1];
                    if (fileId) thumbUrl = `https://drive.google.com/thumbnail?id=${fileId}`;
                }
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(url, i + 1); // Using onclick for better cross-device response
                card.innerHTML = `<div style="position:relative;"><img src="${thumbUrl}"><div style="position:absolute; bottom:5px; right:5px; background:rgba(0,0,0,0.7); color:white; font-size:10px; padding:2px 5px; border-radius:3px;">▶</div></div><p>ভিডিও ${i + 1}</p>`;
                list.appendChild(card);
            });
            if (Object.keys(videos).length > 0 && !document.getElementById('mainVideo').src) {
                playVideo(Object.values(videos)[0], 1);
            }
        });
        // Slider and Stats functions remain same as your original code...
        db.ref('images').on('value', s => {
            const imgs = s.val() || {};
            const slider = document.getElementById('imageSlider');
            slider.innerHTML = '';
            Object.values(imgs).forEach((url, i) => {
                let finalImg = url;
                if (url.includes('drive.google.com')) {
                    const fileId = url.match(/\/d\/([^\/]+)/)?.[1] || url.match(/id=([^\&]+)/)?.[1];
                    if (fileId) finalImg = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
                }
                const imgTag = document.createElement('img');
                imgTag.src = finalImg;
                imgTag.className = `image-slide ${i === 0 ? 'image-active' : ''}`;
                slider.appendChild(imgTag);
            });
        });
    }

    // Interval, doLike, shareVideo, openComment, sendComment, loadComments (Keep your original logic)
    setInterval(() => {
        let active = document.querySelector('.image-slide.image-active');
        if(!active) return;
        let next = active.nextElementSibling || document.querySelector('.image-slide');
        active.classList.remove('image-active'); next.classList.add('image-active');
    }, 4000);
    function loadStats() { db.ref('stats').on('value', snap => { const data = snap.val() || {}; document.getElementById('likeCount').innerText = data.likes || 0; document.getElementById('commentCount').innerText = data.comments || 0; }); }
    function doLike() { /* same */ }
    function shareVideo() { /* same */ }
    function openComment() { /* same */ }
    function sendComment() { /* same */ }
    function loadComments() { /* same */ }
</script>
</body>
</html>
